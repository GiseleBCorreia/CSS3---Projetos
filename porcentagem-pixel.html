<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porcentagem e Pixel</title>
    
    <style> 

        body{
            border: 3px solid purple
        }
        .pixel{
            width: 200px;
            
            background: red;
            border: 1px solid black;
            padding: 8px;
        }
        .porcentagem{
            /*Em relação ao body*/
            width: 50%;
            background: red;
            border: 1px solid black;
            padding: 8px;}

        #area{
            border: 3px solid rgb(0, 0, 0);   
            width: 500px
        }

    </style>



</head>
<body>
  
    <div class="pixel">Pixel</div>
    <div class="porcentagem">Porcentagem</div>
    <div id="area">
        /* Porcentagem é relativa ao pai */
        <div class="pixel">Pixel</div>
        <div class="porcentagem">Porcentagem</div>
    </div>

</body>
</html>
