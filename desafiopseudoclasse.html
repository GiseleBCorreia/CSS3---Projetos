<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classe e pseudo-elemento</title>
    <style>

        a{
            text-decoration: none;
            color: blueviolet;
            padding: 0.5em 1em;
        }

        a:hover {
            background-color: blueviolet;
            color: white;
        }

        a:active {
            background-color: lightblue;
            color: white;
        }

    </style>
</head>
<body>
    <a href="">Home |</a>
    <a href="">Sobre |</a>
    <a href="">Empresa |</a>
    <a href="">Produtos |</a>
    <a href="">Contato</a>
</body>
</html>
