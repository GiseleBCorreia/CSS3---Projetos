<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM e REM</title>

    <style>

        html{
            font-size: 16px; /* Define o tamanho da fonte base para 16 pixels */
                                  }
        /*body{
            font-size: 16px;
        }*/
        p{
            font-size: 2em; /* EM é uma medida relativa ao tamanho da fonte do elemento pai */
        }

        .caixa-pequena{
            border: 3px solid black;
            font-size: 16px;
        }

        .caixa-grande{
            border: 3px solid red;
            font-size: 32px;
        }                                         
        .um-em{
            font-size: 1em; /* 1 vez o tamanho da fonte do elemento pai */
        }
        .dois-em{
            font-size: 2em; /* 2 vezes o tamanho da fonte do elemento pai */
        }
        .tres-em{
            font-size: 3em; /* 3 vezes o tamanho da fonte do elemento pai */
        }

    </style>
</head>
<body>                                                                                                                     
             <p class="em">EM</p>
             <p class="Rem"> REM</p>    
             <p class="porcentagem">Porcentagem</p>
